name: Release
on:
  push:
    branches:
      - main
      - beta
      - next

permissions:
  contents: read # for checkout

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for trusted publishing and npm provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version: lts/*
      - run: pnpm i
      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      - name: Build
        run: pnpm build

      # test after build so we have compiled Lingui files to import
      - name: Install Playwright
        run: pnpm exec playwright install --with-deps
      - name: Test
        run: pnpm test && pnpm test:module-resolution && pnpm test:output-validation && pnpm test:eik-backwards-compat

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in {1..3}; do
            npx semantic-release && break || sleep 30
          done
      - name: Eik login and publish
        if: success()
        run: pnpm eik login -k $EIK_TOKEN && pnpm eik publish || true
        env:
          EIK_TOKEN: ${{ secrets.EIK_TOKEN }}
